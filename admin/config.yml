backend:
  name: github
  repo: freak-m/evergreen
  branch: main

locale: pt
media_folder: "img"
public_folder: "/img"

collections:
  - name: "settings"
    label: "Configurações do Site"
    files:

      # ── SEO, Textos e Contato ──────────────────────────────────
      - label: "SEO, Textos e Contato"
        name: "site"
        file: "_data/site.json"
        format: json
        fields:

          - label: "SEO – Posicionamento no Google"
            name: "seo"
            widget: "object"
            summary: "Título, descrição e imagem para redes sociais"
            fields:
              - label: "Título da Página"
                name: "title"
                widget: "string"
                hint: "Aparece na aba do navegador e nos resultados do Google. Ideal: 50–60 caracteres."
              - label: "Descrição (Google)"
                name: "description"
                widget: "text"
                hint: "Texto exibido abaixo do link no Google. Ideal: 150–160 caracteres."
              - label: "Palavras-chave"
                name: "keywords"
                widget: "string"
                hint: "Separadas por vírgula. Ex: hidrossemeadura Campinas, plantio de grama SP"
              - label: "Imagem para Redes Sociais"
                name: "og_image"
                widget: "image"
                hint: "Imagem exibida ao compartilhar o site no WhatsApp, Facebook e Instagram"

          - label: "Seção Principal (topo da página)"
            name: "hero"
            widget: "object"
            fields:
              - label: "Frase de Impacto"
                name: "tagline"
                widget: "string"
                hint: "Frase abaixo do logo no topo da página"
              - label: "Estatística 1 – Número"
                name: "stat1_value"
                widget: "string"
                hint: 'Ex: "5–7"'
              - label: "Estatística 1 – Texto"
                name: "stat1_label"
                widget: "string"
                hint: 'Ex: "dias p/ primeiros brotos"'
              - label: "Estatística 2 – Número"
                name: "stat2_value"
                widget: "string"
              - label: "Estatística 2 – Texto"
                name: "stat2_label"
                widget: "string"
              - label: "Estatística 3 – Número"
                name: "stat3_value"
                widget: "string"
              - label: "Estatística 3 – Texto"
                name: "stat3_label"
                widget: "string"

          - label: "Chamada para Ação (meio da página)"
            name: "cta"
            widget: "object"
            fields:
              - label: "Pergunta"
                name: "question"
                widget: "string"
                hint: 'Ex: "Quer esse resultado na sua obra?"'
              - label: "Título"
                name: "headline"
                widget: "string"
                hint: 'Ex: "Faça um orçamento já"'

          - label: "Informações de Contato"
            name: "contact"
            widget: "object"
            fields:
              - label: "Telefone (como aparece na tela)"
                name: "phone_display"
                widget: "string"
                hint: 'Ex: "+55 19 98945-5715"'
              - label: "Número do WhatsApp (somente dígitos)"
                name: "whatsapp_number"
                widget: "string"
                hint: 'Ex: "5519989455715"  —  código país + DDD + número, sem espaços'
              - label: "Horário de Atendimento"
                name: "hours_weekday"
                widget: "string"
                hint: 'Ex: "Seg–Sex: 8h às 18h"'

      # ── Fotos do Site ──────────────────────────────────────────
      - label: "Fotos do Site"
        name: "photos"
        file: "_data/photos.json"
        format: json
        fields:

          - label: "Identidade Visual"
            name: "identity"
            widget: "object"
            summary: "Logo, fundo do topo e mockup de celular"
            fields:
              - label: "Logo"
                name: "logo"
                widget: "image"
                hint: "Usado na barra de navegação, no topo e no rodapé"
              - label: "Imagem de Fundo (Topo da Página)"
                name: "hero_bg"
                widget: "image"
                required: false
                hint: "Foto de fundo da seção principal. Deixe vazio para usar a imagem padrão do CSS."
              - label: "Foto do Celular (Seção de Contato)"
                name: "contact_mockup"
                widget: "image"

          - label: "Antes & Depois — Par 1"
            name: "ba1"
            widget: "object"
            fields:
              - { label: "Antes", name: "before", widget: "image" }
              - { label: "Depois", name: "after",  widget: "image" }

          - label: "Antes & Depois — Par 2"
            name: "ba2"
            widget: "object"
            fields:
              - { label: "Antes", name: "before", widget: "image" }
              - { label: "Depois", name: "after",  widget: "image" }

          - label: "Antes & Depois — Par 3"
            name: "ba3"
            widget: "object"
            fields:
              - { label: "Antes", name: "before", widget: "image" }
              - { label: "Depois", name: "after",  widget: "image" }

          - label: "Portfólio (cards deslizantes)"
            name: "portfolio"
            widget: "object"
            summary: "4 imagens dos cards de aplicações"
            fields:
              - { label: "Taludes",    name: "taludes",    widget: "image" }
              - { label: "Industrial", name: "industrial", widget: "image" }
              - { label: "Urbanas",    name: "urbanas",    widget: "image" }
              - { label: "Erosão",     name: "erosao",     widget: "image" }

          - label: "Processo de Germinação (4 etapas)"
            name: "process"
            widget: "object"
            fields:
              - { label: "Etapa 1 – Formação da Capa Protetora",   name: "step1", widget: "image" }
              - { label: "Etapa 2 – Retenção de Umidade",          name: "step2", widget: "image" }
              - { label: "Etapa 3 – Nutrição e Fixação Radicular", name: "step3", widget: "image" }
              - { label: "Etapa 4 – Tapete Fechado",               name: "step4", widget: "image" }

          - label: "Insumos (carrossel)"
            name: "insumos"
            widget: "object"
            fields:
              - { label: "Corretivo de Solo", name: "fertilizantes", widget: "image" }
              - { label: "Sementes",          name: "sementes",      widget: "image" }
              - { label: "Mulch de Fibra",    name: "mulches",       widget: "image" }
              - { label: "Fixador",           name: "fixadores",     widget: "image" }
              - { label: "Adubo Orgânico",    name: "fibra",         widget: "image" }

      # ── Álbum — Galeria de Fotos ───────────────────────────────
      - label: "Álbum – Galeria de Fotos"
        name: "gallery"
        file: "_data/gallery.json"
        format: json
        fields:

          - label: "Fase 1 – Antes"
            name: "antes"
            widget: "list"
            label_singular: "foto"
            summary: "{{fields.label}}"
            hint: "Adicione, remova ou reordene as fotos arrastando."
            fields:
              - { label: "Foto",    name: "image", widget: "image" }
              - { label: "Legenda", name: "label", widget: "string", hint: 'Ex: "Talude Exposto"' }

          - label: "Fase 2 – Aplicação"
            name: "aplicacao"
            widget: "list"
            label_singular: "foto"
            summary: "{{fields.label}}"
            hint: "Adicione, remova ou reordene as fotos arrastando."
            fields:
              - { label: "Foto",    name: "image", widget: "image" }
              - { label: "Legenda", name: "label", widget: "string", hint: 'Ex: "Hidrossemeadura em Curso"' }

          - label: "Fase 3 – Resultado"
            name: "resultado"
            widget: "list"
            label_singular: "foto"
            summary: "{{fields.label}}"
            hint: "Adicione, remova ou reordene as fotos arrastando."
            fields:
              - { label: "Foto",    name: "image", widget: "image" }
              - { label: "Legenda", name: "label", widget: "string", hint: 'Ex: "Tapete Verde Formado"' }
